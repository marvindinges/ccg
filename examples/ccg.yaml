# Example ccg configuration.
#
# Place a global version at ~/.config/ccg/config.yaml, and/or a per-project
# version named .ccg.yaml at your repository root (project overrides global).
#
# Every option below has a CCG_* environment variable that overrides it:
#   CCG_BASE_URL, CCG_MODEL, CCG_API_KEY_ENV, CCG_STRICT_SCHEMA,
#   CCG_PRIMARY_COLOR, CCG_SECONDARY_COLOR, CCG_MAX_HEADER_LEN,
#   CCG_COUNTDOWN_SECONDS, CCG_DEFAULTS, and CCG_TYPES ("name:desc;name:desc").
#
# Omit the whole `provider:` block to run ccg in fully manual mode (no AI).

# Include the built-in commit types (feat, fix, docs, ...). Default: true.
defaults: true

# Abortable countdown (seconds) before a commit or push; press esc to cancel.
# Default: 3. Set to 0 to commit/push immediately with no countdown.
countdown_seconds: 3

provider:
  # Any OpenAI-compatible /chat/completions endpoint.
  base_url: https://api.openai.com/v1
  model: gpt-4o-mini
  # NAME of the environment variable holding your API key (never the key itself).
  # Leave unset for local servers that don't require a key.
  api_key_env: OPENAI_API_KEY
  # Opt into strict json_schema mode for providers that honor it. Default: false
  # (plain JSON mode + defensive parsing, which works across more providers).
  strict_schema: false

# TUI accent colors. Each value is a terminal color name (bright-blue, cyan,
# magenta, …) that follows your terminal theme, an ANSI 256 index (e.g. 141),
# or a hex value (e.g. #a06bff). Defaults: bright-blue / bright-magenta.
colors:
  primary: bright-blue
  secondary: bright-magenta

commit:
  # Recommended header length limit (warning, not enforced). Default: 72.
  max_header_len: 72
  # Custom commit types, merged with the defaults (or used alone if defaults: false).
  types:
    - name: infra
      description: Infrastructure / Terraform changes
